services:
  front:
    build:
      context: ./front
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_NAME: "${NEXT_PUBLIC_NAME:-}"
        NEXT_PUBLIC_SITE_LANG: "${NEXT_PUBLIC_SITE_LANG:-}"
        NEXT_PUBLIC_PRERENDER_LIMIT: "${NEXT_PUBLIC_PRERENDER_LIMIT:-}"
        NEXT_PUBLIC_BASE: "${NEXT_PUBLIC_BASE:-bostongrad.com}"
        NEXT_PUBLIC_INDEX: "${NEXT_PUBLIC_INDEX:-0}"
        NEXT_PUBLIC_RATES_MIN: "${NEXT_PUBLIC_RATES_MIN:-}"
        NEXT_PUBLIC_RATES_RENDER_MIN: "${NEXT_PUBLIC_RATES_RENDER_MIN:-}"
        NEXT_PUBLIC_MIN_RATES_MAP: "${NEXT_PUBLIC_MIN_RATES_MAP:-}"
        NEXT_PUBLIC_TELEGRAM_SUPPORT: "${NEXT_PUBLIC_TELEGRAM_SUPPORT:-}"
        NEXT_PUBLIC_TELEGRAM_BOT: "${NEXT_PUBLIC_TELEGRAM_BOT:-}"
        NEXT_PUBLIC_TELEGRAM_CHAT: "${NEXT_PUBLIC_TELEGRAM_CHAT:-}"
        NEXT_PUBLIC_GOOGLE_MAPS_KEY: "${NEXT_PUBLIC_GOOGLE_MAPS_KEY:-}"
        NEXT_PUBLIC_BOT_USERNAME: "${NEXT_PUBLIC_BOT_USERNAME:-}"
        NEXT_PUBLIC_BOT_START_SECRET: "${NEXT_PUBLIC_BOT_START_SECRET:-}"
        NEXT_PUBLIC_BOT_ALWAYS_VERIFY: "${NEXT_PUBLIC_BOT_ALWAYS_VERIFY:-}"
        NEXT_PUBLIC_TELEGRAM_VERIFY_URL: "${NEXT_PUBLIC_TELEGRAM_VERIFY_URL:-}"
        NEXT_PUBLIC_TELEGRAM_VERIFY_BY_SLUG_URL: "${NEXT_PUBLIC_TELEGRAM_VERIFY_BY_SLUG_URL:-}"
        NEXT_PUBLIC_ALLOW_CRAWLERS: "${NEXT_PUBLIC_ALLOW_CRAWLERS:-}"
        NEXT_PUBLIC_COINGECKO_URL: "${NEXT_PUBLIC_COINGECKO_URL:-}"
        SITE_URL: "${SITE_URL:-}"
        DEBUG_EXCHANGER_MAP: "${DEBUG_EXCHANGER_MAP:-}"
        STRAPI_AUTH_IDENTIFIER: "${STRAPI_AUTH_IDENTIFIER:-}"
        STRAPI_AUTH_PASSWORD: "${STRAPI_AUTH_PASSWORD:-}"
        # Build should use public URLs unless you explicitly override.
        USE_INTERNAL: "${FRONT_BUILD_USE_INTERNAL:-false}"
        IS_DEV: "${FRONT_BUILD_IS_DEV:-false}"
        INTERNAL_CMS_URL: "${INTERNAL_CMS_URL:-}"
        INTERNAL_SERVER_URL: "${INTERNAL_SERVER_URL:-}"
        INTERNAL_CONVERTER_URL: "${INTERNAL_CONVERTER_URL:-}"
    env_file:
      - .env
    environment:
      DEBUG_EXCHANGER_MAP: "${DEBUG_EXCHANGER_MAP:-}"
      USE_INTERNAL: "${USE_INTERNAL:-false}"
      IS_DEV: "${IS_DEV:-false}"
      INTERNAL_CMS_URL: "${INTERNAL_CMS_URL:-}"
      INTERNAL_SERVER_URL: "${INTERNAL_SERVER_URL:-}"
      INTERNAL_CONVERTER_URL: "${INTERNAL_CONVERTER_URL:-}"
    ports:
      - "3000:3000"
    restart: always
    volumes:
      - front_next_cache:/app/.next/cache
    networks:
      - my-network

  stats:
    restart: always
    container_name: stats
    image: darkshrine/stats:latest
    ports:
      - "3001:3001"
    depends_on:
      - redis
    env_file:
      - .env
    environment:
      - PORT=3001
    deploy:
      resources:
        limits:
          cpus: "0.000"
    networks:
      - my-network

  parser:
    restart: always
    container_name: parser
    image: darkshrine/parser:latest
    ports:
      - "5005:5005"
    depends_on:
      - redis
    env_file:
      - .env
    deploy:
      resources:
        limits:
          cpus: "0.000"
    networks:
      - my-network

  redis:
    restart: always
    container_name: redis
    image: redis:latest
    env_file:
      - .env
    volumes:
      - redis_data:/data
    networks:
      - my-network

  server:
    restart: always
    container_name: server
    image: darkshrine/server:latest
    ports:
      - "5000:5000"
    depends_on:
      - redis
    env_file:
      - .env
    networks:
      - my-network

  strapi:
    container_name: strapi
    image: darkshrine/strapi:latest
    restart: always
    env_file: .env
    environment:
      DATABASE_CLIENT: sqlite
      DATABASE_FILENAME: ./data/data.db
      JWT_SECRET: ${JWT_SECRET}
      ADMIN_JWT_SECRET: ${ADMIN_JWT_SECRET}
      NODE_ENV: ${NODE_ENV}
    volumes:
      - data:/opt/app/data
      - public:/opt/app/public
      - config_sync:/opt/app/config/sync
    ports:
      - "1337:1337"
    networks:
      - my-network

  converter:
    container_name: converter
    image: darkshrine/converter:latest
    restart: always
    env_file: .env
    environment:
      NODE_ENV: ${NODE_ENV}
      STRAPI: ${STRAPI}
      EXCHANGERATESAPI_URL: ${EXCHANGERATESAPI_URL}
    ports:
      - "5001:5001"
    networks:
      - my-network
    depends_on:
      - strapi

  telegram_channels_bot:
    container_name: telegram_channels_bot
    image: darkshrine/telegram-channels-bot:latest
    restart: always
    env_file: .env
    environment:
      BOT_TOKEN: ${TELEGRAM_CHANNELS_BOT_TOKEN}
      BOT_NAME: ${TELEGRAM_CHANNELS_BOT_NAME}
      PORT: ${TELEGRAM_CHANNELS_PORT}
      NEXT_PUBLIC_BASE: ${NEXT_PUBLIC_BASE}
      NEXT_PUBLIC_INDEX: ${NEXT_PUBLIC_INDEX}
      USE_INTERNAL: "true"
      CMS_GRAPHQL_URL: "http://strapi:1337/graphql"
      SERVER_BASE_URL: "http://server:5000"
      INTERNAL_CMS_URL: ${INTERNAL_CMS_URL}
      INTERNAL_SERVER_URL: ${INTERNAL_SERVER_URL}
    ports:
      - "3030:3030"
    volumes:
      - telegram_channels_generated:/app/generated
    depends_on:
      - strapi
      - server
    networks:
      - my-network

volumes:
  front_next_cache:
  redis_data:
  data:
  public:
  config_sync:
  telegram_channels_generated:

networks:
  my-network:
    name: my-network
    driver: bridge
